{% extends "admin/base_admin.html" %}

{% block title %}JSON Editor{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5>JSON Configuration Editor</h5>
        <span class="badge bg-warning">⚠️ Advanced</span>
    </div>
    <div class="card-body">
        <div class="alert alert-info">
            <i class="bi bi-info-circle"></i> Edit the raw JSON configuration. Be careful with syntax errors.
        </div>
        
        <div class="mb-3">
            <textarea id="jsonEditor" class="form-control" style="font-family: monospace; height: 500px; font-size: 14px;">{{ config|tojson(indent=2) }}</textarea>
        </div>
        
        <div id="status" class="alert" style="display: none;"></div>
        
        <div class="d-flex gap-2">
            <button class="btn btn-primary" onclick="updateConfig()">
                <i class="bi bi-save"></i> Save Changes
            </button>
            <button class="btn btn-secondary" onclick="formatJSON()">
                <i class="bi bi-brush"></i> Format JSON
            </button>
            <button class="btn btn-secondary" onclick="validateJSON()">
                <i class="bi bi-check-circle"></i> Validate
            </button>
        </div>
    </div>
</div>

<script>
    const editor = document.getElementById('jsonEditor');
    const status = document.getElementById('status');
    
    function showStatus(message, type) {
        status.textContent = message;
        status.className = `alert alert-${type}`;
        status.style.display = 'block';
        setTimeout(() => {
            status.style.display = 'none';
        }, 5000);
    }
    
    function formatJSON() {
        try {
            const data = JSON.parse(editor.value);
            editor.value = JSON.stringify(data, null, 2);
            showStatus('JSON formatted successfully!', 'success');
        } catch (e) {
            showStatus('Invalid JSON: ' + e.message, 'danger');
        }
    }
    
    function validateJSON() {
        try {
            JSON.parse(editor.value);
            showStatus('✓ JSON is valid!', 'success');
        } catch (e) {
            showStatus('✗ Invalid JSON: ' + e.message, 'danger');
        }
    }
    
    async function updateConfig() {
        try {
            const data = JSON.parse(editor.value);
            
            const response = await fetch('/admin/update', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            
            if (result.success) {
                showStatus('✅ ' + result.message, 'success');
            } else {
                showStatus('❌ ' + result.message, 'danger');
            }
        } catch (e) {
            showStatus('❌ Invalid JSON: ' + e.message, 'danger');
        }
    }
</script>
{% endblock %}
