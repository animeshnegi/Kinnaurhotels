{% extends "admin/base_admin.html" %}

{% block title %}{{ action }} Blog Post{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h4>{{ action }} Blog Post</h4>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-8">
                    <div class="mb-3">
                        <label class="form-label">Title *</label>
                        <input type="text" name="title" class="form-control" value="{{ blog.title if blog else '' }}" required>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label class="form-label">Category *</label>
                        <select name="category" class="form-select" required>
                            <option value="Trekking" {% if blog and blog.category == 'Trekking' %}selected{% endif %}>Trekking</option>
                            <option value="Culture & Festivals" {% if blog and blog.category == 'Culture & Festivals' %}selected{% endif %}>Culture & Festivals</option>
                            <option value="Food" {% if blog and blog.category == 'Food' %}selected{% endif %}>Food</option>
                            <option value="Travel Guide" {% if blog and blog.category == 'Travel Guide' %}selected{% endif %}>Travel Guide</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Date *</label>
                        <input type="text" name="date" class="form-control" placeholder="e.g., June 2026" value="{{ blog.date if blog else '' }}" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Image URL *</label>
                        <input type="text" name="image" class="form-control" placeholder="https://example.com/image.jpg" value="{{ blog.image if blog else '' }}" required>
                    </div>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Excerpt *</label>
                <textarea name="excerpt" class="form-control" rows="2" required>{{ blog.excerpt if blog else '' }}</textarea>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Content (one paragraph per line) *</label>
                <textarea name="content" class="form-control" rows="10" required>{% if blog %}{{ blog.content | join('\n') }}{% endif %}</textarea>
                <small class="text-muted">Each line will be a separate paragraph.</small>
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> {{ action }} Blog
                </button>
                <a href="{{ url_for('admin_blogs') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
